<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>NovaSTUDIO</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header id="site-nav" class="site-header"></header>

  <div class="wrap">
    <section class="hero">
      <div class="hero-logo">
        <img src="assets/logo.svg" alt="NovaSTUDIO"
             onerror="this.replaceWith(document.createTextNode('◆'))" />
      </div>
      <h1>NovaSTUDIO</h1>
      <p class="hero-sub">Il cruscotto privato del progetto. Da qui accedi a tutte le aree.</p>
    </section>

    <section>
      <h2>Aree del progetto</h2>
      <div id="aree" class="grid-cards"></div>
    </section>

    <footer>NovaSTUDIO · versione 1 · privato</footer>
  </div>

  <script src="assets/site.js"></script>
</body>
</html>
